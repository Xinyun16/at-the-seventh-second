<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>at-the-seventh-second</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      overscroll-behavior: none;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      min-height: 100vh;
      min-height: 100dvh;
      padding:
        env(safe-area-inset-top)
        env(safe-area-inset-right)
        env(safe-area-inset-bottom)
        env(safe-area-inset-left);
      box-sizing: border-box;
    }

    #stage {
      position: relative;
      line-height: 0;
      max-width: 100%;
      max-height: 100%;
    }

    canvas {
      display: block;
      background: #ffffff;
      max-width: 100%;
      max-height: 100%;
      touch-action: none;
    }

    #coverOverlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      user-select: none;
      z-index: 3;
    }
  </style>
</head>
<body>
  <div id="stage">
    <img id="coverOverlay" src="./assets/cover-overlay.svg" alt="" aria-hidden="true" draggable="false" />
  </div>
  <script src="./lib/p5.min.js"></script>
  <script src="./ramps/radial-ramp-00.js"></script>
  <script src="./ramps/radial-ramp-01.js"></script>
  <script src="./ramps/radial-ramp-02.js"></script>
  <script src="./ramps/radial-ramp-03.js"></script>
  <script src="./ramps/radial-ramp-04.js"></script>
  <script src="./ramps/linear-ramp-05.js"></script>
  <script src="./ramps/linear-ramp-06.js"></script>
  <script src="./ramps/linear-ramp-07.js"></script>
  <script src="./ramps/linear-ramp-08.js"></script>
  <script src="./ramps/radial-ramp-09.js"></script>
  <script src="./ramps/radial-ramp-10.js"></script>
  <script src="./ramps/radial-ramp-11.js"></script>
  <script src="./text-overlay-inline-data.js"></script>
  <script src="./fish-body-scene.js"></script>
</body>
</html>
